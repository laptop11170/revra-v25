<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>RevRa - Workspace Creation</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-container": "#171f33",
                        "surface": "#0b1326",
                        "primary-fixed-dim": "#b8c3ff",
                        "secondary-fixed-dim": "#b8c3ff",
                        "on-error": "#690005",
                        "on-tertiary-fixed-variant": "#5a00c6",
                        "error": "#ffb4ab",
                        "on-surface-variant": "#c4c5d9",
                        "surface-container-low": "#131b2e",
                        "on-secondary-container": "#a1b1ff",
                        "on-secondary-fixed": "#001355",
                        "secondary-fixed": "#dde1ff",
                        "primary": "#b8c3ff",
                        "on-error-container": "#ffdad6",
                        "on-secondary-fixed-variant": "#30418a",
                        "primary-container": "#2d5bff",
                        "on-primary-fixed": "#001355",
                        "on-background": "#dae2fd",
                        "outline-variant": "#434656",
                        "outline": "#8e90a2",
                        "inverse-on-surface": "#283044",
                        "surface-container-highest": "#2d3449",
                        "secondary": "#b8c3ff",
                        "error-container": "#93000a",
                        "on-surface": "#dae2fd",
                        "secondary-container": "#30418a",
                        "inverse-surface": "#dae2fd",
                        "surface-bright": "#31394d",
                        "surface-variant": "#2d3449",
                        "on-primary-fixed-variant": "#0035bd",
                        "background": "#0b1326",
                        "on-primary": "#002387",
                        "tertiary-fixed-dim": "#d2bbff",
                        "on-secondary": "#162972",
                        "primary-fixed": "#dde1ff",
                        "tertiary-container": "#8342f4",
                        "tertiary": "#d2bbff",
                        "on-tertiary": "#3f008e",
                        "on-primary-container": "#efefff",
                        "on-tertiary-container": "#f6ecff",
                        "surface-container-lowest": "#060e20",
                        "tertiary-fixed": "#eaddff",
                        "surface-tint": "#b8c3ff",
                        "surface-dim": "#0b1326",
                        "surface-container-high": "#222a3d",
                        "on-tertiary-fixed": "#25005a",
                        "inverse-primary": "#104af0"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    fontFamily: {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col font-body antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- Suppressed TopNavBar and SideNavBar due to Linear/Transactional intent (Onboarding) -->
<main class="flex-grow flex flex-col items-center justify-center p-6 relative overflow-hidden">
<!-- Ambient Background Glow -->
<div class="absolute inset-0 z-0 pointer-events-none flex items-center justify-center opacity-30">
<div class="w-[800px] h-[800px] bg-primary-container rounded-full blur-[120px] mix-blend-screen opacity-20"></div>
<div class="w-[600px] h-[600px] bg-tertiary-container rounded-full blur-[100px] mix-blend-screen absolute top-[-100px] right-[-100px] opacity-15"></div>
</div>
<div class="w-full max-w-2xl z-10 relative">
<!-- Header Area -->
<div class="text-center mb-12">
<h1 class="text-3xl font-bold tracking-tight text-on-surface mb-2 font-headline">RevRa</h1>
<p class="text-on-surface-variant font-medium">Modern Agent CRM</p>
</div>
<!-- Progress Bar Container -->
<div class="mb-10 w-full px-4">
<div class="flex justify-between items-center relative">
<!-- Progress Track -->
<div class="absolute left-0 top-1/2 -translate-y-1/2 w-full h-1 bg-surface-container-high rounded-full -z-10"></div>
<div class="absolute left-0 top-1/2 -translate-y-1/2 w-1/3 h-1 bg-primary-container rounded-full -z-10 transition-all duration-500"></div>
<!-- Steps -->
<div class="flex flex-col items-center">
<div class="w-8 h-8 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center font-bold text-sm shadow-[0_0_15px_rgba(45,91,255,0.4)]">
<span class="material-symbols-outlined text-[18px]">check</span>
</div>
<span class="text-xs font-medium mt-2 text-primary">Account</span>
</div>
<div class="flex flex-col items-center">
<div class="w-8 h-8 rounded-full bg-surface-container-highest text-on-surface flex items-center justify-center font-bold text-sm ring-2 ring-primary-container ring-offset-2 ring-offset-surface">
                            2
                        </div>
<span class="text-xs font-medium mt-2 text-on-surface">Agency Details</span>
</div>
<div class="flex flex-col items-center">
<div class="w-8 h-8 rounded-full bg-surface-container-high text-on-surface-variant flex items-center justify-center font-bold text-sm">
                            3
                        </div>
<span class="text-xs font-medium mt-2 text-on-surface-variant">Team</span>
</div>
</div>
</div>
<!-- Form Card (Glassmorphic) -->
<div class="bg-surface-variant/60 backdrop-blur-[20px] rounded-xl p-8 shadow-[0_8px_32px_rgba(0,0,0,0.3)] border border-outline-variant/15 relative overflow-hidden">
<div class="mb-8">
<h2 class="text-2xl font-bold font-headline tracking-tight text-on-surface mb-2">Configure Your Workspace</h2>
<p class="text-on-surface-variant text-sm">Set up your agency profile to tailor the RevRa experience to your workflow.</p>
</div>
<form class="space-y-6">
<!-- Agency Name -->
<div class="space-y-2">
<label class="block text-sm font-medium text-on-surface font-label" for="agency_name">Agency Name</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-lg">domain</span>
</div>
<input class="w-full bg-surface-container-lowest border border-outline-variant/30 text-on-surface rounded-lg pl-10 pr-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary-container focus:border-transparent transition-all placeholder:text-on-surface-variant/50" id="agency_name" name="agency_name" placeholder="e.g., Apex Insurance Group" type="text"/>
</div>
</div>
<!-- Primary Coverage Type -->
<div class="space-y-2">
<label class="block text-sm font-medium text-on-surface font-label flex items-center gap-2" for="coverage_type">
                            Primary Coverage Type
                            <span class="px-2 py-0.5 rounded-full bg-tertiary-container/20 text-tertiary text-[10px] font-bold uppercase tracking-wider border border-tertiary-container/30">AI Optimized</span>
</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-lg">health_and_safety</span>
</div>
<select class="w-full bg-surface-container-lowest border border-outline-variant/30 text-on-surface rounded-lg pl-10 pr-10 py-3 focus:outline-none focus:ring-2 focus:ring-primary-container focus:border-transparent appearance-none transition-all" id="coverage_type" name="coverage_type">
<option class="text-on-surface-variant/50" disabled="" selected="" value="">Select coverage focus...</option>
<option class="bg-surface-container text-on-surface" value="medicare">Medicare Advantage &amp; Supp</option>
<option class="bg-surface-container text-on-surface" value="aca">ACA / Under 65 Health</option>
<option class="bg-surface-container text-on-surface" value="life">Life &amp; Annuities</option>
<option class="bg-surface-container text-on-surface" value="property">P&amp;C / Commercial</option>
<option class="bg-surface-container text-on-surface" value="mixed">Mixed Portfolio</option>
</select>
<div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-lg">unfold_more</span>
</div>
</div>
</div>
<!-- Team Size (Bento Grid Style Selection) -->
<div class="space-y-3">
<label class="block text-sm font-medium text-on-surface font-label">Estimated Team Size</label>
<div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
<!-- Option 1 -->
<label class="cursor-pointer">
<input class="peer sr-only" name="team_size" type="radio" value="1"/>
<div class="bg-surface-container-low border border-outline-variant/20 rounded-lg p-4 text-center hover:bg-surface-container transition-colors peer-checked:bg-primary-container/10 peer-checked:border-primary-container peer-checked:text-primary">
<span class="material-symbols-outlined block mb-2 text-on-surface-variant peer-checked:text-primary">person</span>
<span class="text-sm font-medium text-on-surface peer-checked:text-primary">Just Me</span>
</div>
</label>
<!-- Option 2 -->
<label class="cursor-pointer">
<input checked="" class="peer sr-only" name="team_size" type="radio" value="2-5"/>
<div class="bg-surface-container-low border border-outline-variant/20 rounded-lg p-4 text-center hover:bg-surface-container transition-colors peer-checked:bg-primary-container/10 peer-checked:border-primary-container peer-checked:text-primary">
<span class="material-symbols-outlined block mb-2 text-on-surface-variant peer-checked:text-primary">group</span>
<span class="text-sm font-medium text-on-surface peer-checked:text-primary">2 - 5</span>
</div>
</label>
<!-- Option 3 -->
<label class="cursor-pointer">
<input class="peer sr-only" name="team_size" type="radio" value="6-20"/>
<div class="bg-surface-container-low border border-outline-variant/20 rounded-lg p-4 text-center hover:bg-surface-container transition-colors peer-checked:bg-primary-container/10 peer-checked:border-primary-container peer-checked:text-primary">
<span class="material-symbols-outlined block mb-2 text-on-surface-variant peer-checked:text-primary">groups</span>
<span class="text-sm font-medium text-on-surface peer-checked:text-primary">6 - 20</span>
</div>
</label>
<!-- Option 4 -->
<label class="cursor-pointer">
<input class="peer sr-only" name="team_size" type="radio" value="21+"/>
<div class="bg-surface-container-low border border-outline-variant/20 rounded-lg p-4 text-center hover:bg-surface-container transition-colors peer-checked:bg-primary-container/10 peer-checked:border-primary-container peer-checked:text-primary">
<span class="material-symbols-outlined block mb-2 text-on-surface-variant peer-checked:text-primary">corporate_fare</span>
<span class="text-sm font-medium text-on-surface peer-checked:text-primary">21+</span>
</div>
</label>
</div>
</div>
<!-- Action Area -->
<div class="pt-6 mt-6 border-t border-outline-variant/15 flex items-center justify-between">
<button class="text-on-surface-variant hover:text-on-surface text-sm font-medium transition-colors" type="button">
                            Back
                        </button>
<!-- High-value action with gradient 'soul' -->
<button class="bg-gradient-to-r from-primary to-primary-container text-on-primary-container hover:opacity-90 px-8 py-3 rounded-xl font-semibold text-sm transition-all shadow-[0_4px_14px_rgba(45,91,255,0.3)] flex items-center gap-2" type="button">
                            Continue
                            <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</div>
</form>
</div>
<div class="mt-8 text-center">
<p class="text-xs text-on-surface-variant/60 flex items-center justify-center gap-1">
<span class="material-symbols-outlined text-[14px]">lock</span>
                    Your data is securely encrypted and stored.
                </p>
</div>
</div>
</main>
</body></html>
